  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c43159cc-3e18-4306-b390-bbee1f4f052f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --bg:#000;\n    --ink:#fff;\n    --rule:rgba(255,255,255,.16);\n    --rule-strong:rgba(255,255,255,.30);\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Inter Tight',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}\n  body{font-weight:300;letter-spacing:-.005em}\n\n  /* ==================================================\n     LAYOUT\n     ================================================== */\n  .layout-dots{\n    position:fixed;inset:0;\n    display:grid;\n    grid-template-columns: 30% 70%;\n    grid-template-rows: 100vh;\n  }\n  .dots-rail{\n    background:#000;\n    padding:64px 44px;\n    display:flex;flex-direction:column;\n    justify-content:center;\n    gap:56px;\n    overflow-y:auto;min-height:0;\n    color:#fff;\n    container-type: inline-size;\n    border-right:1px solid var(--rule);\n    position:relative;\n    scrollbar-width:thin;scrollbar-color: rgba(255,255,255,.10) transparent;\n  }\n  .dots-rail::-webkit-scrollbar{width:6px}\n  .dots-rail::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10);border-radius:3px}\n\n  /* Small page title pinned to the top-left of the rail. */\n  .dots-pagetitle{\n    position:absolute;\n    top:28px; left:44px;\n    font-family:'Space Grotesk',sans-serif;\n    font-weight:600;\n    font-size:14px;\n    letter-spacing:.02em;\n    color:#7c7c8a;\n    text-transform:none;\n  }\n\n  .dots-header{display:flex;flex-direction:column;width:100%;gap:22px}\n\n  .dots-title{\n    font-family:'Space Grotesk',sans-serif;\n    font-weight:700;\n    font-size:80px; /* sized to fit by JS */\n    line-height:.95;\n    letter-spacing:-.04em;\n    color:#fff;\n    text-transform:uppercase;\n    white-space:nowrap;\n    margin:0;\n    display:block;\n  }\n\n  /* Sub-head pill: toggle switch + caption inside an outlined pill.\n     The whole pill is clickable — not just the toggle. */\n  .subhead-pill{\n    display:inline-flex;\n    align-items:center;\n    gap:16px;\n    padding:12px 32px 12px 18px;\n    border:1px solid var(--rule);\n    border-radius:999px;\n    width:max-content;\n    background:transparent;\n    cursor:pointer;\n    user-select:none;\n    transition: border-color .2s ease;\n  }\n  .subhead-pill:hover{ border-color: var(--rule-strong); }\n  .dots-subhead{\n    font-family:'Space Grotesk',sans-serif;\n    font-weight:500;\n    font-size:clamp(17px, 1.5vw, 23px);\n    line-height:1;\n    letter-spacing:-.005em;\n    color:#cfcfdc;\n    white-space:nowrap;\n  }\n\n  /* Toggle switch — lives inside the subhead pill on its left. */\n  .ts{\n    appearance:none;border:0;cursor:pointer;padding:0;\n    width:54px; height:30px;\n    position:relative;border-radius:999px;\n    background: rgba(255,255,255,.06);\n    border:1px solid var(--rule);\n    transition: background .25s ease, border-color .25s ease;\n    flex-shrink:0;\n  }\n  .ts::before{\n    content:\"\"; position:absolute;\n    left:3px; top:50%;\n    width:20px; height:20px;\n    background:#fff;\n    border-radius:50%;\n    transform: translateY(-50%);\n    transition: left .28s cubic-bezier(.4,0,.2,1), background .28s ease;\n  }\n  .ts[aria-pressed=\"true\"]{\n    background: rgba(255,255,255,.18);\n    border-color: var(--rule-strong);\n  }\n  .ts[aria-pressed=\"true\"]::before{ left: 29px; }\n\n  /* Key list — min-height locks total stack height so the rail content\n     does not jump vertically when swapping datasets with different row counts. */\n  .dots-pct-list{\n    display:grid;\n    grid-template-columns: max-content;\n    align-content: start;          /* don't stretch rows when min-height creates slack */\n    gap:14px;\n    min-height: 540px;\n  }\n  .dots-pct-row{\n    display:flex;align-items:center;gap:18px;\n    font-family:'Space Grotesk',sans-serif;\n    line-height:1;\n    cursor:pointer;\n    transition: opacity .35s ease, border-color .2s ease, background .2s ease;\n    padding:13px 35px 13px 25px;\n    border:1px solid var(--rule);\n    border-radius:14px;\n  }\n  .dots-pct-row:hover{\n    border-color: var(--rule-strong);\n    background: rgba(255,255,255,.03);\n  }\n  .dots-pct-row .p{\n    font-weight:700;\n    font-size:clamp(28px, 2.4vw, 38px);\n    letter-spacing:-.03em;\n    font-variant-numeric:tabular-nums;\n    min-width:1.8em;\n    color: var(--row-color, #fff);\n  }\n  .dots-pct-row .n{\n    font-family:'Inter Tight',sans-serif;\n    font-weight:400;\n    font-size:clamp(13px, 1vw, 15px);\n    color:#fff;\n    letter-spacing:-.005em;\n  }\n  .dots-pct-list[data-hover] .dots-pct-row{ opacity:.30 }\n  .dots-pct-list[data-hover] .dots-pct-row.is-active{ opacity:1 }\n\n  /* ---- Stage (right pane) ---- */\n  .dots-stage{\n    background:#000;\n    position:relative;\n    display:flex;align-items:center;justify-content:center;\n    padding:48px;\n    overflow:hidden;\n  }\n\n  .dot{\n    border-radius:50%;\n    background-repeat:no-repeat;\n  }\n\n  /* Circle layout (sole layout — phyllotaxis arrangement) */\n  .dots-circle{\n    position:absolute;\n    inset:0;\n    width:100%;height:100%;\n    pointer-events:auto;\n  }\n  .circle-ring{\n    position:absolute;\n    left:50%;top:50%;\n    border-radius:50%;\n    border:1px solid var(--rule);\n    pointer-events:none;\n  }\n  .dots-circle .dot{\n    position:absolute;\n    left:50%;top:50%;\n    transform-origin:center center;\n    will-change: transform;\n    background-color: var(--dot-grey);\n    pointer-events:none; /* container handles hit-testing via mousemove */\n    cursor:pointer;\n    transition: background-color .25s ease;\n  }\n  /* Active dot in circle view: solo color flash via WAAPI (no group dim\n     unless triggered from the key buttons). */\n  .dots-circle[data-hover] .dot{ opacity:.18; transition: opacity .35s ease, background-color .25s ease; }\n  .dots-circle[data-hover] .dot.is-active{\n    opacity:.5;\n    background-color: var(--dot-color);\n  }\n\n  /* ---- Overlay (key-button hover only) ---- */\n  .dots-overlay{\n    position:absolute;inset:24px;\n    display:flex;flex-direction:column;align-items:center;justify-content:center;\n    pointer-events:none;\n    opacity:0;\n    transition: opacity .5s ease;\n    z-index:5;\n    font-family:'Space Grotesk',sans-serif;\n    text-align:center;\n    padding:2%;\n  }\n  .dots-stage[data-hover] .dots-overlay{ opacity:1 }\n  .ovr-pct{\n    font-family:'Space Grotesk',sans-serif;\n    font-weight:700;\n    font-size:clamp(140px, 26vw, 360px);\n    line-height:1.45;\n    letter-spacing:-.05em;\n    background-image: var(--ovr-grad, linear-gradient(180deg,#fff,#fff));\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n    -webkit-text-fill-color: transparent;\n    overflow: visible;\n    margin-bottom: -.16em;\n  }\n  .ovr-name{\n    font-family:'Space Grotesk',sans-serif;\n    font-weight:600;\n    font-size:clamp(22px, 2.8vw, 44px);\n    line-height:1.05;\n    letter-spacing:-.02em;\n    color:#fff;\n    margin-top:0;\n    text-transform:uppercase;\n  }\n\n  /* ---- Dataset swap fade ---- */\n  .swap-pane{\n    transition: opacity .5s ease;\n  }\n  body.is-swapping .swap-pane{ opacity: 0; }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<div class=\"layout-dots\">\n  <aside class=\"dots-rail\">\n    <div class=\"dots-pagetitle\">Isaac – Design<\u002Fdiv>\n\n    <div class=\"dots-header\" id=\"dots-header\">\n      <h1 class=\"dots-title\" id=\"dots-title\">Time Pie<\u002Fh1>\n      <div class=\"subhead-pill\" id=\"subhead-pill\">\n        <button class=\"ts\" id=\"dataset-toggle\" aria-pressed=\"false\" aria-label=\"Toggle dataset\" tabindex=\"-1\"><\u002Fbutton>\n        <span class=\"dots-subhead swap-pane\" id=\"dots-subhead\">by business area<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"dots-pct-list swap-pane\" id=\"dots-pct-list\"><\u002Fdiv>\n  <\u002Faside>\n\n  <section class=\"dots-stage\" id=\"dots-stage\">\n    <div class=\"dots-circle\" id=\"dots-circle\">\n      <div class=\"circle-ring\" id=\"circle-ring\"><\u002Fdiv>\n      <div class=\"swap-pane\" id=\"dots-host\" style=\"position:absolute;inset:0\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dots-overlay\" id=\"dots-overlay\">\n      <div class=\"ovr-pct\" id=\"ovr-pct\">0%<\u002Fdiv>\n      <div class=\"ovr-name\" id=\"ovr-name\">—<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n\n<script>\n/* ============================================================\n   DATASETS — two views: business areas (default) + creative areas\n   ============================================================ */\nconst DATASETS = {\n  business: {\n    label: 'by business area',\n    data: [\n      { id:'bizdev',  name:'business development', pct:17.90, intPct:18 },\n      { id:'pmm',     name:'product marketing',    pct:17.28, intPct:17 },\n      { id:'sales',   name:'sales',                pct:16.04, intPct:16 },\n      { id:'growth',  name:'growth marketing',     pct:16.03, intPct:16 },\n      { id:'events',  name:'events',               pct:14.19, intPct:14 },\n      { id:'content', name:'content',              pct: 7.40, intPct: 8 },\n      { id:'other',   name:'other',                pct:11.09, intPct:11 },\n    ],\n    gradients: {\n      bizdev:  'linear-gradient(180deg, #455720 0%, #788c34 15%, #b09c4a 35%, #d9bd78 50%, #d5bb90 60%, #aab1d0 80%, #5d72c8 100%)',\n      pmm:     'linear-gradient(180deg, #1c5dd2 0%, #3b75dd 25%, #6e95e0 45%, #c0a4d4 65%, #e8b8d0 85%, #f3cdda 100%)',\n      sales:   'linear-gradient(180deg, #f4c5af 0%, #f3a8b0 25%, #efbcb8 50%, #c5c89a 72%, #6c7a3c 92%, #475622 100%)',\n      growth:  'linear-gradient(180deg, #d6a5e2 0%, #ecc6e2 22%, #f1dcd0 45%, #f0d5a0 68%, #ebbe50 90%, #d99f1e 100%)',\n      events:  'linear-gradient(180deg, #fae8c4 0%, #f5cc94 25%, #ef9c5a 55%, #df756e 85%, #cf5c5c 100%)',\n      content: 'linear-gradient(180deg, #a52442 0%, #c84a52 18%, #de7860 38%, #e89c70 56%, #ebb8a4 74%, #efd0cc 100%)',\n      other:   'linear-gradient(180deg, #fadfe8 0%, #f4c8d6 30%, #e9a8c0 55%, #d486aa 80%, #b86088 100%)',\n    },\n    activeColor: {\n      bizdev:'#d9bd78', pmm:'#6e95e0', sales:'#f3a8b0', growth:'#ecc6e2',\n      events:'#ef9c5a', content:'#de7860', other:'#e9a8c0'\n    },\n    grey: {\n      bizdev:  '#2a2a32',\n      pmm:     '#3a3a44',\n      sales:   '#4a4a56',\n      growth:  '#5a5a68',\n      events:  '#6a6a7a',\n      content: '#7a7a8c',\n      other:   '#8c8c9e',\n    }\n  },\n\n  creative: {\n    label: 'by creative area',\n    data: [\n      { id:'presentations',   name:'presentations',                pct:30, intPct:30 },\n      { id:'eventbooths',     name:'event booths / collateral',    pct:25, intPct:25 },\n      { id:'brandwork',       name:'brand work / website content', pct:20, intPct:20 },\n      { id:'newsletter',      name:'newsletter / social content',  pct:15, intPct:15 },\n      { id:'misc',            name:'miscellaneous requests',       pct:10, intPct:10 },\n    ],\n    gradients: {\n      // presentations — deep indigo → lavender → cream\n      presentations: 'linear-gradient(180deg, #1f2a8e 0%, #3a48c4 22%, #6e7adf 50%, #b2b8ec 78%, #e0e2f4 100%)',\n      // event booths — burnt sienna → tangerine → cream\n      eventbooths:   'linear-gradient(180deg, #7a2410 0%, #c44a1e 22%, #ef9c5a 50%, #f5cc94 78%, #fae8c4 100%)',\n      // brand work — deep violet → orchid → blush\n      brandwork:     'linear-gradient(180deg, #4a2a8c 0%, #7d54c6 25%, #b294e0 55%, #e0c8ed 80%, #efd6e6 100%)',\n      // newsletter — forest → teal → sage\n      newsletter:    'linear-gradient(180deg, #1f4f3a 0%, #2f7a5a 28%, #58a48a 55%, #92c8b0 80%, #d4e8dc 100%)',\n      // misc — wine → coral → buttercream\n      misc:          'linear-gradient(180deg, #7a2a3a 0%, #c5566a 25%, #f08c9a 55%, #f6c4cc 80%, #fae0e4 100%)',\n    },\n    activeColor: {\n      presentations: '#6e7adf',\n      eventbooths:   '#ef9c5a',\n      brandwork:     '#b294e0',\n      newsletter:    '#58a48a',\n      misc:          '#f08c9a',\n    },\n    grey: {\n      presentations: '#2a2a32',\n      eventbooths:   '#404048',\n      brandwork:     '#565660',\n      newsletter:    '#6c6c78',\n      misc:          '#828290',\n    }\n  },\n};\n\n/* ============================================================\n   References + state\n   ============================================================ */\nconst circle      = document.getElementById('dots-circle');\nconst dotsStage   = document.getElementById('dots-stage');\nconst dotsHost    = document.getElementById('dots-host');\nconst dotsPctList = document.getElementById('dots-pct-list');\nconst subheadEl   = document.getElementById('dots-subhead');\nconst ovrPct      = document.getElementById('ovr-pct');\nconst ovrName     = document.getElementById('ovr-name');\nconst toggleBtn   = document.getElementById('dataset-toggle');\nconst subheadPill = document.getElementById('subhead-pill');\n\nlet currentKey = 'business';\nlet activeData = DATASETS[currentKey].data;\nlet activeGradients = DATASETS[currentKey].gradients;\nlet activeColors    = DATASETS[currentKey].activeColor;\nlet activeGreys     = DATASETS[currentKey].grey;\nlet circleDots = [];\nlet bandEls    = {};\n\n/* SVG hit-test bands container (created once, contents regenerated per swap). */\nconst SVG_NS = 'http://www.w3.org/2000/svg';\nconst bandsSvg = document.createElementNS(SVG_NS, 'svg');\nbandsSvg.setAttribute('class', 'circle-bands');\nbandsSvg.id = 'circle-bands';\nbandsSvg.style.position = 'absolute';\nbandsSvg.style.inset = '0';\nbandsSvg.style.overflow = 'visible';\nbandsSvg.style.pointerEvents = 'none';\nbandsSvg.style.zIndex = '2';\ncircle.appendChild(bandsSvg);\n\n/* ============================================================\n   Build for the current dataset\n   ============================================================ */\nfunction buildForDataset(key){\n  currentKey      = key;\n  const ds        = DATASETS[key];\n  activeData      = ds.data;\n  activeGradients = ds.gradients;\n  activeColors    = ds.activeColor;\n  activeGreys     = ds.grey;\n\n  // Update subhead text\n  subheadEl.textContent = ds.label;\n\n  // Build dot order (flat array of intPct × each category, totaling 100).\n  const dotsOrder = [];\n  activeData.forEach(d=>{ for (let i=0;i<d.intPct;i++) dotsOrder.push(d); });\n\n  // Wipe existing dots\n  dotsHost.querySelectorAll('.dot').forEach(el => el.remove());\n  // Wipe existing bands\n  Array.from(bandsSvg.children).forEach(c => c.remove());\n\n  // Build new dots into the host (positions assigned by layoutCircle)\n  const GOLDEN = Math.PI * (3 - Math.sqrt(5));\n  circleDots = [];\n  dotsOrder.forEach((d, i)=>{\n    const el = document.createElement('div');\n    el.className = 'dot';\n    el.dataset.cat = d.id;\n    el.style.setProperty('--dot-grey',  activeGreys[d.id]);\n    el.style.setProperty('--dot-color', activeColors[d.id]);\n    el.title = `${d.name} · ${d.intPct}%`;\n    const angle = i * GOLDEN;\n    const rUnit = Math.sqrt(i + 0.5);\n    circleDots.push({ el, d, angle, rUnit });\n    dotsHost.appendChild(el);\n  });\n\n  // Build new SVG bands\n  bandEls = {};\n  activeData.forEach(d=>{\n    const c = document.createElementNS(SVG_NS, 'circle');\n    c.dataset.cat = d.id;\n    c.setAttribute('cx', '0');\n    c.setAttribute('cy', '0');\n    c.setAttribute('fill', 'none');\n    c.setAttribute('stroke', 'transparent');\n    c.setAttribute('pointer-events', 'stroke');\n    c.style.pointerEvents = 'none'; // pulse mode → bands disabled, but kept for layout math\n    c.addEventListener('mouseenter', ()=> setHover(d.id));\n    bandsSvg.appendChild(c);\n    bandEls[d.id] = c;\n  });\n\n  // Build key buttons\n  dotsPctList.innerHTML = '';\n  activeData.forEach(d=>{\n    const row = document.createElement('div');\n    row.className = 'dots-pct-row';\n    row.dataset.cat = d.id;\n    row.style.setProperty('--row-color', activeColors[d.id]);\n    row.innerHTML = `<span class=\"p\">${d.intPct}%<\u002Fspan><span class=\"n\">${d.name}<\u002Fspan>`;\n    row.addEventListener('mouseenter', ()=> setHover(d.id));\n    dotsPctList.appendChild(row);\n  });\n\n  // Layout the new dots immediately\n  circleLaidOut = false;\n  pollCircleLayout(20);\n}\n\n/* Solo dot pulse — flash to category color and fade back to grey over 1.5s. */\nfunction pulseDot(el){\n  if (el._pulseAnim) el._pulseAnim.cancel();\n  const cs = getComputedStyle(el);\n  const color = cs.getPropertyValue('--dot-color').trim();\n  const grey  = cs.getPropertyValue('--dot-grey').trim();\n  el._pulseAnim = el.animate(\n    [\n      { backgroundColor: color, offset: 0 },\n      { backgroundColor: grey,  offset: 1 }\n    ],\n    { duration: 1500, easing: 'ease-out' }\n  );\n}\n\n/* ============================================================\n   Nearest-dot pulse — mousemove on the circle finds the nearest dot\n   and triggers its pulse (no dead zones between dots).\n   ============================================================ */\nlet lastNearest = null;\ncircle.addEventListener('mousemove', (e)=>{\n  if (!circleDots.length) return;\n  const r = circle.getBoundingClientRect();\n  const x = e.clientX - r.left - r.width/2;\n  const y = e.clientY - r.top  - r.height/2;\n  // Stay inside the container ring\n  const dist = Math.sqrt(x*x + y*y);\n  if (dist > circleMetrics.maxR + 30) { lastNearest = null; return; }\n\n  // Find nearest dot by squared distance (using current base positions).\n  let best = null, bestD = Infinity;\n  for (let i = 0; i < circleDots.length; i++){\n    const o = circleDots[i];\n    const dx = x - o.baseX, dy = y - o.baseY;\n    const d = dx*dx + dy*dy;\n    if (d < bestD){ bestD = d; best = o; }\n  }\n  if (best && best !== lastNearest){\n    pulseDot(best.el);\n    lastNearest = best;\n  }\n});\ncircle.addEventListener('mouseleave', ()=>{ lastNearest = null; setHover(null); });\n\n/* ============================================================\n   Hover (key-button driven only — drives the big overlay)\n   ============================================================ */\nfunction setHover(catId){\n  if (!catId){\n    [circle, dotsStage, dotsPctList].forEach(el => el.removeAttribute('data-hover'));\n    document.querySelectorAll('.dot.is-active, .dots-pct-row.is-active').forEach(el => el.classList.remove('is-active'));\n    return;\n  }\n  const data = activeData.find(x => x.id === catId);\n  if (!data) return;\n  [circle, dotsStage, dotsPctList].forEach(el => el.setAttribute('data-hover', catId));\n  document.querySelectorAll('.dot, .dots-pct-row').forEach(el => {\n    el.classList.toggle('is-active', el.dataset.cat === catId);\n  });\n  ovrPct.textContent = data.intPct + '%';\n  ovrPct.style.setProperty('--ovr-grad', activeGradients[catId]);\n  ovrName.textContent = data.name;\n}\ndotsPctList.addEventListener('mouseleave', ()=> setHover(null));\n\n/* ============================================================\n   Circle layout (phyllotaxis) — sizes + positions all dots and\n   recomputes the SVG bands for the current dataset.\n   ============================================================ */\nlet circleMetrics = { cx: 0, cy: 0, scale: 1, maxR: 1 };\nlet circleLaidOut = false;\nfunction layoutCircle(){\n  const w = circle.clientWidth, h = circle.clientHeight;\n  const sz = Math.min(w, h);\n  if (sz <= 0) return;\n  if (!circleDots.length) return;\n  circleLaidOut = true;\n\n  const containerR = sz * 0.44;\n  const maxR = sz * 0.39;\n  const N = circleDots.length;\n  const rMax = Math.sqrt(N - 1 + 0.5);\n  const scale = maxR / rMax;\n  circleMetrics = { cx: w/2, cy: h/2, scale, maxR };\n\n  // Position + size the container ring\n  const ring = document.getElementById('circle-ring');\n  const ringD = containerR * 2;\n  ring.style.width  = ringD + 'px';\n  ring.style.height = ringD + 'px';\n  ring.style.marginLeft = -containerR + 'px';\n  ring.style.marginTop  = -containerR + 'px';\n\n  // Position each dot (size ramps from center → edge)\n  circleDots.forEach(o=>{\n    const t = o.rUnit / rMax;\n    const sizeFactor = 1.15 - 0.78 * t;\n    const size = Math.max(6, scale * sizeFactor);\n    const x = Math.cos(o.angle) * o.rUnit * scale;\n    const y = Math.sin(o.angle) * o.rUnit * scale;\n    o.baseX = x; o.baseY = y;\n    o.depth = 0.30 + t * 0.90;\n    o.size  = size;\n    o.el.style.width = size + 'px';\n    o.el.style.height = size + 'px';\n    o.el.style.marginLeft = -size/2 + 'px';\n    o.el.style.marginTop  = -size/2 + 'px';\n    o.el.style.transform = `translate(${x}px, ${y}px)`;\n  });\n\n  // SVG viewBox: (0,0) at cluster center\n  bandsSvg.setAttribute('viewBox', `${-w/2} ${-h/2} ${w} ${h}`);\n\n  // Compute band sizes for the current dataset\n  let startIdx = 0;\n  activeData.forEach((d, di)=>{\n    const endIdx = startIdx + d.intPct - 1;\n    const innerUnit = startIdx === 0 ? 0 : Math.sqrt(startIdx);\n    const outerUnit = Math.sqrt(endIdx + 1);\n    let innerR = innerUnit * scale;\n    let outerR = outerUnit * scale;\n    if (di === activeData.length - 1) outerR = containerR;\n\n    const c = bandEls[d.id];\n    if (!c) return;\n    if (di === 0){\n      c.setAttribute('r', outerR);\n      c.setAttribute('stroke-width', 0);\n      c.setAttribute('fill', 'transparent');\n    } else {\n      const midR  = (innerR + outerR) / 2;\n      const bandW = outerR - innerR;\n      c.setAttribute('r', midR);\n      c.setAttribute('stroke-width', bandW);\n      c.setAttribute('fill', 'none');\n    }\n    startIdx = endIdx + 1;\n  });\n}\n\nfunction pollCircleLayout(attemptsLeft){\n  if (circleLaidOut) return;\n  layoutCircle();\n  if (circleLaidOut || attemptsLeft <= 0) return;\n  setTimeout(()=> pollCircleLayout(attemptsLeft - 1), 32);\n}\n\n/* ============================================================\n   Stage sizing + initial build\n   ============================================================ */\nfunction fitStage(){ layoutCircle(); }\nwindow.addEventListener('resize', fitStage);\n\nif (typeof ResizeObserver !== 'undefined'){\n  const ro = new ResizeObserver(()=> layoutCircle());\n  ro.observe(circle);\n}\n\n// Initial build\nbuildForDataset('business');\nfitStage();\npollCircleLayout(30);\nwindow.addEventListener('load', ()=> pollCircleLayout(10));\n\n/* ============================================================\n   Title fit-to-width\n   ============================================================ */\nfunction fitTitleLine(el, container){\n  const target = container.clientWidth;\n  if (target <= 0) return;\n  const REF = 100;\n  el.style.fontSize = REF + 'px';\n  const w = el.scrollWidth || el.getBoundingClientRect().width;\n  if (w > 0) el.style.fontSize = (REF * (target / w)) + 'px';\n}\nfunction fitDotsHeader(){\n  const header = document.getElementById('dots-header');\n  if (!header) return;\n  fitTitleLine(document.getElementById('dots-title'), header);\n}\nfitDotsHeader();\nif (document.fonts && document.fonts.ready) document.fonts.ready.then(fitDotsHeader);\nwindow.addEventListener('resize', fitDotsHeader);\n\n/* ============================================================\n   Mouse parallax\n   ============================================================ */\nlet mx = 0, my = 0, tx = 0, ty = 0;\nconst PX_AMP = 18;\nconst EASE  = 0.08;\ndotsStage.addEventListener('pointermove', e=>{\n  const r = dotsStage.getBoundingClientRect();\n  mx = Math.max(-1, Math.min(1, ((e.clientX - r.left)/r.width  - 0.5) * 2));\n  my = Math.max(-1, Math.min(1, ((e.clientY - r.top )/r.height - 0.5) * 2));\n});\ndotsStage.addEventListener('pointerleave', ()=>{ mx = 0; my = 0; });\n\nfunction parallaxLoop(){\n  tx += (mx - tx) * EASE;\n  ty += (my - ty) * EASE;\n  circleDots.forEach(o=>{\n    const px = tx * PX_AMP * o.depth;\n    const py = ty * PX_AMP * o.depth;\n    o.el.style.transform = `translate(${o.baseX + px}px, ${o.baseY + py}px)`;\n  });\n  requestAnimationFrame(parallaxLoop);\n}\nrequestAnimationFrame(parallaxLoop);\n\n/* ============================================================\n   Dataset toggle (with cross-fade)\n   ============================================================ */\nlet isSwapping = false;\nasync function setDataset(key){\n  if (isSwapping || key === currentKey) return;\n  isSwapping = true;\n  // Clear any existing hover state\n  setHover(null);\n  // Fade out the swap panes\n  document.body.classList.add('is-swapping');\n  await new Promise(r => setTimeout(r, 500));\n  // Swap content\n  buildForDataset(key);\n  // Allow one paint then fade back in\n  await new Promise(r => requestAnimationFrame(r));\n  document.body.classList.remove('is-swapping');\n  // Update toggle aria state\n  toggleBtn.setAttribute('aria-pressed', key === 'creative' ? 'true' : 'false');\n  // Wait out the fade-in before re-enabling\n  setTimeout(()=>{ isSwapping = false; }, 500);\n}\nsubheadPill.addEventListener('click', ()=>{\n  setDataset(currentKey === 'business' ? 'creative' : 'business');\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
